<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page Not Found · EONS Animation Studio</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%23080610'/><text y='.9em' font-size='72' font-family='serif' font-weight='900' fill='%239b6fd4' x='8'>E</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#05040e;--v:#9b6fd4;--v2:#7a52b8;--mauve:#c4b0e8;--dim:rgba(196,176,232,.4);--white:#f0ecfa;--gb:rgba(180,160,240,.12);}
body{background:var(--bg);color:var(--white);font-family:'Barlow',sans-serif;font-weight:300;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;cursor:none;}
@media(pointer:coarse){body{cursor:auto;}}
#cur,#cur-ring{position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);border-radius:50%;}
#cur{width:8px;height:8px;background:var(--v);mix-blend-mode:screen;}
#cur-ring{width:32px;height:32px;border:1px solid rgba(155,111,212,.3);z-index:9998;transition:all .2s;}
@media(pointer:coarse){#cur,#cur-ring{display:none;}}
canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:0 32px;height:56px;display:flex;align-items:center;justify-content:space-between;background:rgba(5,4,14,.85);border-bottom:1px solid var(--gb);backdrop-filter:blur(20px);}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.12em;color:var(--white);text-decoration:none;}
.nav-logo span{color:var(--v);}
.wrap{position:relative;z-index:2;text-align:center;padding:20px;max-width:600px;}
.err-code{font-family:'Bebas Neue',sans-serif;font-size:clamp(100px,20vw,180px);letter-spacing:.04em;line-height:1;background:linear-gradient(135deg,var(--v) 0%,var(--mauve) 50%,var(--v2) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:0;}
.err-label{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--dim);margin-bottom:20px;font-family:'Barlow',sans-serif;}
.err-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(28px,5vw,42px);letter-spacing:.06em;margin-bottom:16px;line-height:1.1;}
.err-sub{font-size:15px;color:var(--dim);line-height:1.7;margin-bottom:40px;max-width:420px;margin-left:auto;margin-right:auto;}
.err-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.btn-home{padding:13px 28px;background:linear-gradient(135deg,var(--v),var(--v2));border:none;border-radius:100px;font-size:14px;font-weight:600;color:#fff;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:8px;box-shadow:0 0 24px rgba(155,111,212,.3);transition:all .3s;font-family:'Barlow',sans-serif;letter-spacing:.04em;}
.btn-home:hover{box-shadow:0 0 40px rgba(155,111,212,.5);transform:translateY(-2px);}
.btn-ai{padding:13px 28px;background:transparent;border:1px solid rgba(155,111,212,.3);border-radius:100px;font-size:14px;font-weight:500;color:var(--mauve);cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:8px;transition:all .3s;font-family:'Barlow',sans-serif;}
.btn-ai:hover{border-color:var(--v);color:var(--white);background:rgba(155,111,212,.08);}
.err-hint{margin-top:48px;font-size:12px;color:rgba(155,111,212,.25);letter-spacing:.06em;}
</style>
</head>
<body>
<div id="cur"></div><div id="cur-ring"></div>
<canvas id="c"></canvas>
<nav>
  <a href="index.html" class="nav-logo">E<span>O</span>NS</a>
</nav>
<div class="wrap">
  <div class="err-code">404</div>
  <div class="err-label">Page Not Found</div>
  <h1 class="err-title">This Frame<br>Doesn't Exist</h1>
  <p class="err-sub">The page you're looking for has moved, been deleted, or never existed. Let's get you back on track.</p>
  <div class="err-actions">
    <a href="index.html" class="btn-home">← Back to EONS</a>
    <a href="studio-ai.html" class="btn-ai">✦ Try EONS AI</a>
  </div>
  <p class="err-hint">EONS ANIMATION STUDIO · NEW YORK CITY</p>
</div>
<script>
// Cursor
const cur=document.getElementById('cur'),ring=document.getElementById('cur-ring');
document.addEventListener('mousemove',e=>{
  cur.style.left=e.clientX+'px';cur.style.top=e.clientY+'px';
  ring.style.left=e.clientX+'px';ring.style.top=e.clientY+'px';
});

// Minimal particle canvas
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight;}
resize();addEventListener('resize',resize);

class P{
  constructor(){this.reset(true);}
  reset(init){
    this.x=(Math.random()-.5)*2800;this.y=(Math.random()-.5)*2800;
    this.z=init?Math.random()*900:900;
    const sp=0.3+Math.random()*0.6,th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1);
    this.vx=sp*Math.sin(ph)*Math.cos(th)+(Math.random()-.5)*.2;
    this.vy=sp*Math.sin(ph)*Math.sin(th)+(Math.random()-.5)*.2;
    this.vz=-(0.3+Math.random()*.8);
    this.pulse=Math.random()*Math.PI*2;
    this.pspd=0.015+Math.random()*.018;
    this.sz=0.6+Math.random()*2.2;
  }
  draw(){
    const fov=500,sc=fov/(fov+this.z);
    const px=this.x*sc+W/2,py=this.y*sc+H/2;
    if(px<-80||px>W+80||py<-80||py>H+80)return;
    const sz=this.sz*sc*3,pulse=0.5+0.45*Math.sin(this.pulse),op=pulse*Math.pow(sc,.65)*.85;
    ctx.beginPath();ctx.arc(px,py,sz*.4,0,Math.PI*2);
    ctx.fillStyle=`hsla(270,75%,${70+pulse*20}%,${op*.9})`;ctx.fill();
    const g=ctx.createRadialGradient(px,py,0,px,py,sz*2.8);
    g.addColorStop(0,`hsla(270,70%,65%,${op*.5})`);g.addColorStop(1,`hsla(270,40%,20%,0)`);
    ctx.beginPath();ctx.arc(px,py,sz*2.8,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
    this.z+=this.vz;this.x+=this.vx;this.y+=this.vy;this.pulse+=this.pspd;
    this.vx*=.999;this.vy*=.999;
    if(this.z<1)this.reset();
  }
}
const pts=[];for(let i=0;i<180;i++)pts.push(new P());
function draw(){
  ctx.fillStyle='rgba(5,4,14,.18)';ctx.fillRect(0,0,W,H);
  pts.forEach(p=>p.draw());requestAnimationFrame(draw);
}
ctx.fillStyle='#05040e';ctx.fillRect(0,0,W,H);draw();
</script>
</body>
</html>
